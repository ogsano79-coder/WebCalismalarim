<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Seçici Uygulaması</title>
</head>
<body>

    <h2>Name ve TagName Seçici Örneği</h2>

    <!-- NAME ÖRNEĞİ -->
    <input type="text" name="kullaniciAdi" placeholder="Kullanıcı Adı">
    <input type="text" name="kullaniciAdi" placeholder="İkinci Alan">

    <br><br>

    <!-- TAGNAME ÖRNEĞİ -->
    <span>Birinci span</span><br>
    <span>İkinci span</span><br>
    <span>Üçüncü span</span><br>

    <br>

    <button onclick="nameSecici()">Name Seçici Çalıştır</button>
    <button onclick="tagSecici()">TagName Seçici Çalıştır</button>

    <script src="script.js"></script>

</body>
</html>
